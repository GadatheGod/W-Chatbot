version: "3.8"

services:
  webaichat:
    build: .
    ports:
      - "13700:13700"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    environment:
      - OLLAMA_HOST=localhost
    restart: unless-stopped

  # Uncomment below if you want Ollama running in Docker
  # ollama:
  #   image: ollama/ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

volumes:
  ollama_data:
