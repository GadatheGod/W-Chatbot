<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAI Chat — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f47a3 0%, #1a73e8 40%, #4fc3f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1a73e8, #4fc3f7);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .login-logo .icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }
        .login-logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .login-logo p {
            font-size: 14px;
            color: #666;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #1a73e8;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a73e8, #4fc3f7);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26,115,232,0.4);
        }
        .login-btn:disabled {
            background: #90b4f2;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .error-message.show {
            display: flex;
        }
        .error-message svg {
            width: 18px;
            height: 18px;
            fill: #721c24;
            flex-shrink: 0;
        }
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <div class="icon">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            </div>
            <h1>WebAI Chat</h1>
            <p>Admin Panel Login</p>
        </div>

        <div class="error-message" id="error-msg">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <span id="error-text">Invalid username or password</span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus placeholder="Enter your username" />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Enter your password" />
            </div>
            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
        </form>

        <div class="footer-text">
            Secured by WebAI Chat Authentication
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const btn = document.getElementById("login-btn");
            const errorMsg = document.getElementById("error-msg");
            const errorText = document.getElementById("error-text");

            btn.disabled = true;
            btn.textContent = "Signing in...";
            errorMsg.classList.remove("show");

            try {
                const response = await fetch("/api/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.logged_in) {
                    window.location.href = "/admin";
                } else {
                    errorText.textContent = data.detail || "Invalid username or password";
                    errorMsg.classList.add("show");
                    btn.disabled = false;
                    btn.textContent = "Sign In";
                    document.getElementById("password").value = "";
                    document.getElementById("password").focus();
                }
            } catch (e) {
                errorText.textContent = "Connection error. Please try again.";
                errorMsg.classList.add("show");
                btn.disabled = false;
                btn.textContent = "Sign In";
            }
        }

        // Auto-focus username field
        document.getElementById("username").focus();

        // Enter key support
        document.getElementById("password").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                handleLogin(e);
            }
        });
    </script>
</body>
</html>
